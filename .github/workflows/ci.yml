name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Install dependencies
        run: pip install -e ".[mcp,plugins]" pytest
      - name: Verify signed plugin fixture
        run: python scripts/verify/verify_plugin_manifests.py tests/fixtures/plugin/signed_manifest.json tests/fixtures/plugin/trusted_public.pem
      - name: Run tests
        run: pytest -q
